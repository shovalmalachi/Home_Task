services:
  mongo:
    image: mongo:7
    container_name: octopus-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  app:
    build:
      context: ./app
    container_name: octopus-app
    depends_on:
      - mongo
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017
      DB_NAME: octopusdb
      COLLECTION_NAME: fruits
    ports:
      - "3000:3000"

volumes:
  mongo_data:
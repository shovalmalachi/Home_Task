name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker
        uses: docker/setup-buildx-action@v4

      - name: Build containers
        run: docker compose up --build -d

      - name: Wait for app to be ready
        run: |
          for i in {1..15}; do
            if curl -s http://localhost:3000/health | grep '"status":"ok"'; then
              echo "App is ready"
              exit 0
            fi
            echo "Waiting for app..."
            sleep 3
          done
          echo "App did not start"
          docker compose logs
          exit 1

      - name: Seed database
        run: docker compose exec -T app npm run seed

      - name: Run tests
        run: ./scripts/test.sh
        
      - name: show logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        run: docker compose down -v

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Home Task</title>
</head>
<body>

  <h1>Hello World</h1>

  <h2 id="apples-count">Loading apples...</h2>

  <ul id="fruit-list"></ul>

  <script>
    async function loadFruits() {
      try {
        const response = await fetch('/api/fruits');
        const fruits = await response.json();

        const apples = fruits.find(f => f.name === "apples");
        const applesCountEl = document.getElementById("apples-count");
        applesCountEl.textContent = `Number of apples: ${apples ? apples.qty : 0}`;

        const list = document.getElementById('fruit-list');
        list.innerHTML = '';

        fruits.forEach((fruit) => {
          const item = document.createElement('li');
          item.textContent = `${fruit.name} | qty: ${fruit.qty} | rating: ${fruit.rating}`;
          list.appendChild(item);
        });

      } catch (error) {
        document.getElementById("apples-count").textContent = "Failed to load data";
      }
    }

    loadFruits();
  </script>

</body>
</html>
